<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ファイル整頓アプリ</title>
    <style>
        :root {
            --primary-color: #E6E6FA; /* ラベンダー */
            --primary-text: #4B0082;  /* インディゴ・濃い紫 */
            --primary-hover: #D8D8F8; /* ホバー時の少し濃いラベンダー */
            --bg-color: #FFF0F5;      /* ベビーピンク (LavenderBlush) */
            --sidebar-bg: #F9FAFB;
            --border-color: #E5E7EB;
            --text-main: #1F2937;
            --text-sub: #6B7280;
        }

        body { 
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex;
            height: 100vh;
            background: var(--bg-color);
            color: var(--text-main);
            user-select: none;
        }

        /* 左側：サイドバー */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding-top: 20px;
        }
        .sidebar-header {
            padding: 0 20px 10px;
            font-weight: bold;
            font-size: 14px;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* フォルダリストのコンテナ */
        .folder-list {
            flex: 1;
            overflow-y: auto;
        }

        .folder-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            color: var(--text-main);
            font-size: 15px;
            border-left: 3px solid transparent;
            cursor: pointer;
        }
        .folder-item:hover {
            background: #F3F4F6;
        }
        .folder-item.active {
            background: #EFF6FF;
            border-left-color: #A4A4FF;
            color: #4B0082;
            font-weight: bold;
        }
        .folder-icon { margin-right: 12px; font-size: 1.2em; }
        .file-count { margin-left: auto; background: #E5E7EB; color: #4B5563; font-size: 11px; padding: 2px 6px; border-radius: 10px; }
        .folder-item.active .file-count { background: #BFDBFE; color: #1E40AF; }

        /* フォルダ追加エリア */
        .add-folder-section {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            background: #FFF;
        }
        .add-folder-input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .add-folder-btn {
            width: 100%;
            padding: 8px;
            background: #F3F4F6;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
        }
        .add-folder-btn:hover {
            background: #E5E7EB;
        }

        /* 右側：メインコンテンツ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .header {
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
        }
        .header h2 { margin: 0; font-size: 1.2em; font-weight: 600; }
        
        .content-body { padding: 30px; max-width: 900px; }

        /* ツールバー */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }
        button { 
            padding: 10px 20px; 
            cursor: pointer; 
            border-radius: 6px; 
            border: 1px solid var(--border-color); 
            background: #fff; 
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button:hover { background: #F9FAFB; }

        /* 仕分け・ダミー生成ゾーンの比率修正 */
        .zones-container {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }
        .action-zone { 
            border: 2px dashed var(--border-color); 
            padding: 25px 20px; 
            background: #FAFBFC; 
            border-radius: 8px; 
            text-align: center;
            transition: border-color 0.2s;
        }
        .action-zone:hover { border-color: #A4A4FF; }
        .action-zone h3 { margin: 0 0 5px 0; font-size: 1em; }
        .action-zone p { color: var(--text-sub); font-size: 0.85em; margin-bottom: 15px; }
        
        /* 比率調整 (個別仕分け 6 : サンプル生成 4) */
        .zone-main { flex: 6; }
        .zone-sub { flex: 4; }
        
        .file-upload-btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary-color); 
            color: var(--primary-text); 
            border: 1px solid #D1D1F0; 
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: background 0.2s;
        }
        .file-upload-btn:hover { background: var(--primary-hover); }
        input[type="file"] { display: none; }

        /* 現在のフォルダ内ファイル一覧テーブル */
        .file-list-section { margin-bottom: 25px; }
        .file-list-section h3 { font-size: 1em; color: var(--text-main); margin-bottom: 10px; }
        .file-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }
        .file-table th, .file-table td {
            text-align: left;
            padding: 10px 15px;
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
        }
        .file-table th { background: #F9FAFB; color: var(--text-sub); font-weight: 600; }
        .file-table tr:last-child td { border-bottom: none; }
        .empty-message { color: var(--text-sub); font-style: italic; text-align: center; padding: 20px !important; }

        /* ファイル名リンクのスタイル */
        .file-link {
            color: #2563EB;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }
        .file-link:hover {
            text-decoration: underline;
            color: #1D4ED8;
        }

        /* ログ出力エリア */
        .log-section h3 { font-size: 1em; color: var(--text-main); margin-bottom: 10px; }
        #result { 
            padding: 15px; 
            background: #1E1E1E; 
            color: #D4D4D4; 
            border-radius: 8px; 
            white-space: pre-wrap; 
            font-family: 'Consolas', 'Courier New', monospace; 
            min-height: 100px; 
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<!-- 左側：サイドバー（フォルダツリー） -->
<div class="sidebar">
    <div class="sidebar-header">マイフォルダ</div>
    
    <!-- フォルダアイテムが動的に挿入されるコンテナ -->
    <div class="folder-list" id="folder-list-container"></div>
    
    <!-- フォルダ追加セクション -->
    <div class="add-folder-section">
        <input type="text" id="new-folder-input" class="add-folder-input" placeholder="新しいフォルダ名（キーワード）">
        <button class="add-folder-btn" onclick="addNewFolder()">＋ フォルダを追加</button>
    </div>
</div>

<!-- 右側：メイン画面 -->
<div class="main-content">
    <div class="header">
        <h2>📁 ファイル整頓アプリ</h2>
    </div>
    
    <div class="content-body">
        <!-- 操作ボタン群 -->
        <div class="toolbar">
            <button onclick="triggerUndo()">↩️ 直前の仕分けを元に戻す (Undo)</button>
        </div>

        <div class="zones-container">
            <!-- 個別ファイル仕分け -->
            <div class="action-zone zone-main">
                <h3>1. ファイルを読み込んで自動整頓</h3>
                <p>PC内のファイルを選択すると、自動でキーワード判定されて各フォルダへ直接格納されます。</p>
                <label class="file-upload-btn">
                    🔍 ファイルを選択して自動仕分け
                    <input type="file" id="file-selector" onchange="handleFileSelect(this)">
                </label>
            </div>

            <!-- テストファイル生成ゾーン -->
            <div class="action-zone zone-sub" style="border-style: solid; background: #f0f7ff;">
                <h3>2. デモ用サンプル自動生成</h3>
                <p>PCにファイルを準備しなくても、評価用の模擬ファイルを各フォルダへ瞬時に自動配分します。</p>
                <button onclick="generateSampleFiles()" style="margin: 0 auto; background: #e1effe; color: #1e429f; border-color: #a4cafe;">📄 模擬ファイルを一括生成</button>
            </div>
        </div>

        <!-- リアルタイムファイル一覧 -->
        <div class="file-list-section">
            <h3 id="current-folder-title">📄 現在のフォルダ: 実験</h3>
            <table class="file-table">
                <thead>
                    <tr>
                        <th width="70%">ファイル名 (クリックで開く)</th>
                        <th width="30%">ファイル形式</th>
                    </tr>
                </thead>
                <tbody id="file-list-tbody">
                    <!-- JavaScriptで動的に挿入されます -->
                </tbody>
            </table>
        </div>
        
        <!-- ログ表示エリア -->
        <div class="log-section">
            <h3>📋 実行結果・診断ログ</h3>
            <div id="result">ファイルを読み込むか、デモ用サンプルを生成してアプリをお試しください。</div>
        </div>
    </div>
</div>

<script>
    // 選択された本物のファイルオブジェクトを一時的にメモリ保持するマップ（リロードでクリアされる）
    let liveFileObjects = {};

    // --- 状態の初期化（ローカルストレージのチェック） ---
    let storage, customFolders, ruleMap;

    function loadState() {
        const savedStorage = localStorage.getItem('file_organizer_storage');
        const savedFolders = localStorage.getItem('file_organizer_customFolders');
        const savedRules = localStorage.getItem('file_organizer_ruleMap');

        if (savedStorage && savedFolders && savedRules) {
            storage = JSON.parse(savedStorage);
            customFolders = JSON.parse(savedFolders);
            ruleMap = JSON.parse(savedRules);
        } else {
            // デフォルトの状態
            storage = {
                "実験": [],
                "数学": [],
                "英語": [],
                "未該当": []
            };
            customFolders = ["実験", "数学", "英語"];
            ruleMap = {"実験": "実験", "数学": "数学", "英語": "英語"};
        }
    }

    // 現在の状態をローカルストレージに保存する関数
    function saveState() {
        localStorage.setItem('file_organizer_storage', JSON.stringify(storage));
        localStorage.setItem('file_organizer_customFolders', JSON.stringify(customFolders));
        localStorage.setItem('file_organizer_ruleMap', JSON.stringify(ruleMap));
    }

    // 初期起動時の選択フォルダを最初のカスタムフォルダにする
    let currentFolder = "実験";
    let lastMovedHistory = []; // Undo用

    // 起動時の初期化処理
    loadState();
    if (!storage[currentFolder]) {
        currentFolder = Object.keys(storage)[0] || "未該当";
    }
    renderSidebar();
    switchFolder(currentFolder);

    // サイドバーを動的に描画する関数
    function renderSidebar() {
        const container = document.getElementById('folder-list-container');
        container.innerHTML = "";

        // 1. 動的フォルダ（追加可能項目）
        customFolders.forEach(folder => {
            createSidebarItem(container, folder, "📁", folder);
        });

        // 2. 未該当（固定）
        createSidebarItem(container, "未該当", "📁", "未該当");
    }

    // サイドバーの各アイテムを生成するヘルパー
    function createSidebarItem(parent, key, icon, label) {
        const div = document.createElement('div');
        div.className = `folder-item ${currentFolder === key ? 'active' : ''}`;
        div.onclick = () => switchFolder(key);
        div.innerHTML = `
            <span class="folder-icon">${icon}</span> ${label} 
            <span class="file-count" id="count-${key}">${storage[key] ? storage[key].length : 0}</span>
        `;
        parent.appendChild(div);
    }

    // フォルダ動的追加機能
    function addNewFolder() {
        const input = document.getElementById('new-folder-input');
        const folderName = input.value.trim();

        if (!folderName) {
            alert("フォルダ名（キーワード）を入力してください。");
            return;
        }
        if (storage[folderName] || folderName === "未該当") {
            alert("既に同じ名前のフォルダが存在します。");
            return;
        }

        // 状態の更新
        customFolders.push(folderName);
        storage[folderName] = [];
        ruleMap[folderName] = folderName;

        // ストレージへ保存
        saveState();

        input.value = ""; // 入力欄クリア
        renderSidebar();  // 再描画
        switchFolder(folderName); // 追加したフォルダに移動
        
        printLog(`新しくフォルダ「${folderName}」を追加しました。\n今後、ファイル名に「${folderName}」が含まれるものはこのフォルダに自動仕分けされます。`, "フォルダ追加");
    }

    // フォルダ切り替え機能
    function switchFolder(folderKey) {
        currentFolder = folderKey;
        renderSidebar(); // 見た目更新
        
        document.getElementById('current-folder-title').textContent = `📄 現在のフォルダ: ${folderKey}`;
        
        updateView();
    }

    // 画面とバッジ数のリアルタイム更新
    function updateView() {
        for (let key in storage) {
            const badge = document.getElementById(`count-${key}`);
            if (badge) badge.textContent = storage[key].length;
        }

        const tbody = document.getElementById('file-list-tbody');
        tbody.innerHTML = "";

        const files = storage[currentFolder] || [];
        if (files.length === 0) {
            tbody.innerHTML = `<tr><td colspan="2" class="empty-message">このフォルダは空です</td></tr>`;
            return;
        }

        files.forEach(filename => {
            const ext = filename.split('.').pop().toUpperCase() + " ファイル";
            // ファイル名をクリックすると openFile 関数が走るようにリンク化
            const row = `<tr>
                <td>📄 <span class="file-link" onclick="openFile('${filename}')">${filename}</span></td>
                <td>${ext}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    // ログエリア出力ヘルパー
    function printLog(msg, title = "実行結果") {
        const now = new Date().toLocaleTimeString();
        document.getElementById('result').textContent = `--- 実行時刻: ${now} [${title}] ---\n${msg}`;
    }

    // 振分先の判定ロジック
    function determineDestination(filename) {
        for (let keyword in ruleMap) {
            if (filename.includes(keyword)) return ruleMap[keyword];
        }
        return "未該当";
    }

    // --- 各種アクション ---

    // 1. ファイルを開く機能 (本物/模擬のハイブリッド対応)
    function openFile(filename) {
        // メモリ上に実際のファイルオブジェクトが残っている場合（選択直後など）
        if (liveFileObjects[filename]) {
            const file = liveFileObjects[filename];
            const fileURL = URL.createObjectURL(file);
            window.open(fileURL, '_blank');
            printLog(`実際のファイル「${filename}」をブラウザの新しいタブで開きました。`, "ファイルオープン");
            return;
        }

        // 模擬ファイル、またはアプリ再起動後のファイルの場合（デモ用の内容を生成して見せる）
        let dummyContent = `【ファイル整頓アプリ - デモ用プレビュービューア】\n\n`;
        dummyContent += `ファイル名: ${filename}\n`;
        dummyContent += `ステータス: 現在 [${currentFolder}] フォルダ内に安全に保管されています。\n`;
        dummyContent += `--------------------------------------------------\n`;
        dummyContent += `これはシミュレーターが自動生成した、ファイルの中身のデモ表示です。\n`;
        dummyContent += `実際のアプリでは、PC内のローカルファイルを直接起動、または対応するアプリケーション（Word、Excel等）に受け渡して展開します。\n`;
        dummyContent += `第三者が評価・確認を行う際、PC側に本物のファイルを準備する手間を省くための親切設計シミュレーション機能です。`;

        // テキストファイルとしてブラウザの別タブで綺麗に展開する
        const blob = new Blob([dummyContent], { type: 'text/plain;charset=utf-8' });
        const dummyURL = URL.createObjectURL(blob);
        window.open(dummyURL, '_blank');
        
        printLog(`デモ用ファイル「${filename}」のシミュレーション内容を新しいタブで表示しました。`, "ファイルオープン(デモ)");
    }

    // 2. 模擬（サンプル）ファイル生成
    function generateSampleFiles() {
        // 各フォルダに直接ファイルを配分する仕様に変更
        storage["実験"] = ["第1回_物理実験データ.xlsx", "化学実験レポート_最終版.txt"];
        storage["数学"] = ["数学基礎_課題回答.docx", "微分積分_演習問題.pdf"];
        storage["英語"] = ["英語リスニング演習.mp3"];
        storage["未該当"] = ["提出スケジュール一覧.txt", "アイデアメモ.png"];
        
        // 新しく生成されたため本物のファイルオブジェクトは空にする
        liveFileObjects = {};
        lastMovedHistory = [];
        
        // 保存
        saveState();
        
        switchFolder(currentFolder); // 現在の表示を更新
        printLog("他者評価・デモ用に、各フォルダに合計7つの模擬ファイルを自動生成・配分しました。\nファイル名をクリックすると、中身の確認（デモ閲覧）が可能です！", "サンプル自動生成");
        alert("デモ用ファイルを各フォルダに自動配置しました！ファイル名をクリックして中身を確認してみてください。");
    }

    // 3. 元に戻す (Undo) - 直前に追加したファイルを削除する
    function triggerUndo() {
        if (lastMovedHistory.length === 0) {
            printLog("元に戻す直前の移動履歴がありません。", "Undo失敗");
            alert("Undo対象の履歴がありません。");
            return;
        }

        let count = 0;
        lastMovedHistory.forEach(history => {
            const idx = storage[history.to].indexOf(history.file);
            if (idx > -1) {
                storage[history.to].splice(idx, 1);
                // 振り分け元がないため、Undo時はアプリ上からデータを取り除く（またはliveFileObjectsから削除）
                if (liveFileObjects[history.file]) delete liveFileObjects[history.file];
                count++;
            }
        });

        lastMovedHistory = [];
        
        // 保存
        saveState();
        
        updateView();
        printLog(`[Undo成功] 直前に追加した ${count} 件のファイルの仕分けを取り消し、削除しました。`, "元に戻しました");
        alert("直前の追加を取り消しました。");
    }

    // 4. ファイルを選択して直接仕分け（振り分け元を経由しない）
    function handleFileSelect(input) {
        if (input.files.length === 0) return;
        const file = input.files[0];
        const filename = file.name;

        // 本物のファイルオブジェクトをメモリに保持（「開く」ボタン用）
        liveFileObjects[filename] = file;

        // 直接格納先を決定
        const dest = determineDestination(filename);
        storage[dest].push(filename);
        
        // Undo用に履歴を残す
        lastMovedHistory = [{ file: filename, to: dest }];
        
        // 保存
        saveState();
        
        // 自動で仕分け先のフォルダに切り替えてユーザーに見せる
        switchFolder(dest);
        
        printLog(`【自動整頓 実行結果】\n  [成功] ${filename} ➔ [${dest}] フォルダへ直接格納しました。`, "自動仕分け完了");
        alert(`「${filename}」は、名前のキーワード判定により自動的に【${dest}】フォルダへ整理されました！`);
        
        input.value = ''; // リセット
    }
</script>

</body>
</html>
