<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマートファイル仕分けマスター</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; }
        h1 { margin: 0; color: #2c3e50; font-size: 24px; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; border: 1px solid #e6ebf0; }
        .card h2 { margin-top: 0; font-size: 18px; color: #34495e; border-left: 4px solid #3498db; padding-left: 10px; }
        
        .file-list, .rule-list { list-style: none; padding: 0; max-height: 250px; overflow-y: auto; border: 1px solid #eee; border-radius: 4px; }
        .file-item, .rule-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .file-item:last-child, .rule-item:last-child { border-bottom: none; }
        .file-item:hover, .rule-item:hover { background-color: #fcfdfe; }
        
        .btn { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; font-size: 13px; }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-primary:hover { background-color: #2980b9; }
        .btn-success { background-color: #2ecc71; color: white; width: 100%; padding: 12px; font-size: 15px; margin-bottom: 10px; }
        .btn-success:hover { background-color: #27ae60; }
        .btn-danger { background-color: #e74c3c; color: white; padding: 4px 8px; font-size: 12px; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-secondary { background-color: #95a5a6; color: white; }
        .btn-secondary:hover { background-color: #7f8c8d; }

        .form-group { display: flex; gap: 10px; margin-top: 15px; }
        .form-group input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        
        .console-area { background-color: #2c3e50; color: #ecf0f1; border-radius: 6px; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 13px; white-space: pre-wrap; height: 180px; overflow-y: auto; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
        .actions { display: flex; gap: 10px; margin-bottom: 15px; }
        .empty-msg { color: #95a5a6; text-align: center; padding: 20px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📁 スマートファイル仕分けシステム</h1>
        <div>
            <button class="btn btn-secondary" onclick="requestAction('/undo')">↩ 1つ前の状態に戻す(Undo)</button>
        </div>
    </header>

    <div class="dashboard">
        <div class="card">
            <h2>📥 仕分け元のファイル一覧</h2>
            <ul id="fileList" class="file-list">
                </ul>
        </div>

        <div class="card">
            <h2>⚙ 自動仕分けルール</h2>
            <ul id="ruleList" class="rule-list">
                </ul>
            <div class="form-group">
                <input type="text" id="ruleKeyword" placeholder="ファイル名のキーワード (例: 数学)">
                <input type="text" id="ruleFolder" placeholder="移動先フォルダ名 (例: 数学)">
                <button class="btn btn-primary" onclick="addRule()">ルール追加</button>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-primary" style="flex: 1; padding: 12px;" onclick="requestAction('/preview')">🔍 割り当てプレビューを確認</button>
        <button class="btn btn-success" style="flex: 2; margin-bottom: 0;" onclick="requestAction('/execute')">🚀 フォルダ仕分けを一括実行する</button>
    </div>

    <div class="card" style="padding: 15px;">
        <h2 style="font-size: 15px; margin-bottom: 10px; border-left-color: #7f8c8d;">🖥 実行ログ・結果</h2>
        <div id="console" class="console-area">アプリが起動しました。待ッています...</div>
    </div>
</div>

<script>
    // 画面ロード時とデータ更新時に状態をサーバーから取得
    async function loadData() {
        try {
            const response = await fetch('/api/data');
            const data = await response.json();
            
            // ファイル一覧の描画
            const fileListEl = document.getElementById('fileList');
            fileListEl.innerHTML = '';
            if (data.files.length === 0) {
                fileListEl.innerHTML = '<li class="empty-msg">仕分け元フォルダは空です。</li>';
            } else {
                data.files.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerHTML = `<span>📄 ${file}</span><button class="btn btn-danger" onclick="deleteFile('${file}')">削除</button>`;
                    fileListEl.appendChild(li);
                });
            }

            // ルール一覧の描画
            const ruleListEl = document.getElementById('ruleList');
            ruleListEl.innerHTML = '';
            const keys = Object.keys(data.rules);
            if (keys.length === 0) {
                ruleListEl.innerHTML = '<li class="empty-msg">設定されたルールがありません。</li>';
            } else {
                keys.forEach(key => {
                    const li = document.createElement('li');
                    li.className = 'rule-item';
                    li.innerHTML = `<span>🔍 「<strong>${key}</strong>」が含まれる場合 ➔ 📁 <strong>[${data.rules[key]}]</strong></span>
                                    <button class="btn btn-danger" onclick="deleteRule('${key}')">削除</button>`;
                    ruleListEl.appendChild(li);
                });
            }
        } catch (error) {
            printConsole("データの読み込みに失敗しました。");
        }
    }

    // プレビュー・実行・Undoの共通処理
    async function requestAction(endpoint) {
        try {
            const response = await fetch(endpoint);
            const data = await response.json();
            printConsole(data.result);
            if (data.alert) alert(data.alert);
            loadData(); // 実行後に一覧を再更新
        } catch (error) {
            printConsole("エラーが発生しました。");
        }
    }

    // ルールの追加
    async function addRule() {
        const keyword = document.getElementById('ruleKeyword').value.trim();
        const folder = document.getElementById('ruleFolder').value.trim();
        if (!keyword || !folder) { alert("キーワードとフォルダ名を入力してください。"); return; }

        const response = await fetch('/api/rule/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ keyword, folder })
        });
        const data = await response.json();
        printConsole(data.result);
        document.getElementById('ruleKeyword').value = '';
        document.getElementById('ruleFolder').value = '';
        loadData();
    }

    // ルールの削除
    async function deleteRule(keyword) {
        if(!confirm(`キーワード「${keyword}」のルールを削除しますか？`)) return;
        const response = await fetch('/api/rule/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ keyword })
        });
        const data = await response.json();
        printConsole(data.result);
        loadData();
    }

    // 仕分け元ファイルの削除
    async function deleteFile(filename) {
        if(!confirm(`「${filename}」を完全に削除しますか？(この操作は戻せません)`)) return;
        const response = await fetch('/api/file/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename })
        });
        const data = await response.json();
        printConsole(data.result);
        loadData();
    }

    function printConsole(text) {
        const consoleEl = document.getElementById('console');
        consoleEl.innerText = text;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    // 初回読み込み
    window.onload = loadData;
</script>
</body>
</html>
